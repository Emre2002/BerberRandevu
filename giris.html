<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Berber Girişi | BerberRandevu</title>
    <link rel="stylesheet" href="super-admin.css">
    <style>
        html, body { max-width: 100%; overflow-x: hidden; }
        .giris-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }
        .giris-card {
            width: 100%;
            max-width: 420px;
            background: linear-gradient(145deg, var(--sa-bg-elevated), var(--sa-bg-card));
            border: 1px solid var(--sa-border);
            border-radius: var(--sa-radius);
            padding: 40px 32px;
            box-shadow: var(--sa-shadow);
        }
        .giris-brand {
            text-align: center;
            margin-bottom: 28px;
        }
        .giris-brand__icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 16px;
            border-radius: 50%;
            background: rgba(212, 168, 83, 0.15);
            border: 1px solid rgba(212, 168, 83, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        .giris-brand__title {
            margin: 0 0 6px;
            font-size: 1.5rem;
            font-weight: 700;
        }
        .giris-brand__subtitle {
            margin: 0;
            font-size: 0.875rem;
            color: var(--sa-text-muted);
        }
        .giris-error {
            display: none;
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.35);
            border-radius: var(--sa-radius-sm);
            color: var(--sa-danger);
            font-size: 0.875rem;
            text-align: center;
            padding: 12px;
            margin-bottom: 16px;
        }
        .giris-back {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 0.8125rem;
            color: var(--sa-text-muted);
            text-decoration: none;
        }
        .giris-back:hover { color: var(--sa-text); }
    </style>
</head>
<body>
    <div class="giris-page">
        <div class="giris-card">
            <div class="giris-brand">
                <div class="giris-brand__icon">✂️</div>
                <h1 class="giris-brand__title">BerberRandevu</h1>
                <p class="giris-brand__subtitle">Yönetim paneline giriş yapın</p>
            </div>

            <div class="giris-error" id="girisError" role="alert" hidden></div>

            <form id="girisForm" autocomplete="off">
                <div class="sa-form-group" style="margin-bottom:16px;">
                    <label for="girisUsername">Kullanıcı Adı</label>
                    <input type="text" id="girisUsername" placeholder="Kullanıcı adınız" required autocomplete="username">
                </div>
                <div class="sa-form-group" style="margin-bottom:20px;">
                    <label for="girisPassword">Şifre</label>
                    <input type="password" id="girisPassword" placeholder="Şifreniz" required autocomplete="current-password">
                </div>
                <button type="submit" class="sa-btn sa-btn--primary" id="girisSubmitBtn" style="width:100%;min-height:44px;">Giriş Yap</button>
            </form>

            <a href="index.html" class="giris-back">← Ana sayfaya dön</a>
        </div>
    </div>
    <script type="module" src="giris.js"></script>
</body>
</html>
