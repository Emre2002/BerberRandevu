<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0;url=giris.html">
    <title>Yönlendiriliyor | BerberRandevu</title>
    <link rel="stylesheet" href="super-admin.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            margin: 0;
        }
        .redirect-card {
            max-width: 420px;
            width: 100%;
            text-align: center;
            padding: 40px 32px;
            background: linear-gradient(145deg, var(--sa-bg-elevated), var(--sa-bg-card));
            border: 1px solid var(--sa-border);
            border-radius: var(--sa-radius);
            box-shadow: var(--sa-shadow);
        }
        .redirect-card h1 {
            margin: 0 0 12px;
            font-size: 1.25rem;
        }
        .redirect-card p {
            margin: 0;
            color: var(--sa-text-muted);
            line-height: 1.6;
            font-size: 0.9rem;
        }
        .redirect-card a {
            color: var(--sa-accent);
        }
    </style>
    <script>
        window.location.replace("giris.html");
    </script>
</head>
<body>
    <div class="redirect-card">
        <h1>Berber girişi yenilendi</h1>
        <p>Giriş sayfasına yönlendiriliyorsunuz. Otomatik yönlendirme olmazsa <a href="giris.html">buraya tıklayın</a>.</p>
    </div>
</body>
</html>
